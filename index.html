<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Capital Quiz</title>
    <link rel="icon" href="/favicon.png" type="image/svg+xml" />

    <!-- Open Graph / social preview -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Capital Quiz" />
    <meta property="og:description" content="Guess the world's capitals from a single dot on the globe. No borders, no labels — just your knowledge." />
    <meta property="og:image"       content="https://YOUR-DOMAIN.pages.dev/og-image.png" />
    <meta property="og:url"         content="https://YOUR-DOMAIN.pages.dev" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Capital Quiz" />
    <meta name="twitter:description" content="Guess the world's capitals from a single dot on the globe. No borders, no labels — just your knowledge." />
    <meta name="twitter:image"       content="https://YOUR-DOMAIN.pages.dev/og-image.png" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">

      <!-- Mode select -->
      <div id="screen-mode-select" class="screen">
        <h1>Capital Quiz</h1>
        <p>A red dot will appear on the globe. Type the name of the capital city it represents.</p>
        <div class="mode-grid">
          <button class="mode-tile" data-mode="endless">
            <div class="mode-name">Endless</div>
            <div class="mode-desc">Free play. No timer, no score. Exit any time.</div>
          </button>
          <button class="mode-tile" data-mode="daily">
            <div class="mode-name">Daily Challenge</div>
            <div class="mode-desc">5 questions, 30 seconds each. Once per day.</div>
          </button>
          <button class="mode-tile" data-mode="hard">
            <div class="mode-name">Extra Hard</div>
            <div class="mode-desc">Only the 5 nearest capitals are shown. No global context.</div>
          </button>
          <button class="mode-tile" data-mode="metro">
            <div class="mode-name">Metro Quiz</div>
            <div class="mode-desc">Guess the city from its metro map. No labels, no borders.</div>
          </button>
        </div>
      </div>

      <!-- Game -->
      <div id="screen-game" class="screen">
        <button id="exit-btn" class="btn btn-secondary" type="button">Exit</button>
        <div id="globe-container"></div>
        <div id="feedback-overlay"></div>
        <div class="game-ui">
          <div class="question-counter" id="question-counter">Question 1 of 5</div>
          <div class="question-label">Which capital city is this?</div>
          <div class="input-row">
            <input
              id="answer-input"
              type="text"
              placeholder="Type the capital city…"
              autocomplete="off"
              spellcheck="false"
            />
            <button id="submit-btn" class="btn btn-primary">Submit</button>
          </div>
          <div class="timer-bar-wrap">
            <div id="timer-bar"></div>
          </div>
        </div>
      </div>

      <!-- Metro Quiz -->
      <div id="screen-metro" class="screen">
        <button id="metro-exit-btn" class="btn btn-secondary" type="button">Exit</button>
        <div id="metro-map"></div>
        <canvas id="metro-canvas"></canvas>
        <div id="metro-feedback"></div>
        <div class="game-ui">
          <div class="question-label">Which city is this metro system?</div>
          <div class="input-row">
            <input
              id="metro-input"
              type="text"
              placeholder="Type the city…"
              autocomplete="off"
              spellcheck="false"
            />
            <button id="metro-submit" class="btn btn-primary">Submit</button>
          </div>
          <button id="metro-hint" class="btn btn-secondary">Hint</button>
        </div>
      </div>

      <!-- End -->
      <div id="screen-end" class="screen">
        <h2>You scored</h2>
        <div class="score-display" id="end-score">0 / 5</div>
        <div class="share-text" id="share-text"></div>
        <button id="share-btn" class="btn btn-secondary">Share result</button>
        <p style="color:var(--muted);font-size:0.85rem;">Come back tomorrow for a new quiz.</p>
      </div>

      <!-- Already played -->
      <div id="screen-done" class="screen">
        <h2>Already played today</h2>
        <p id="done-score" style="color:var(--muted)"></p>
        <p style="color:var(--muted);font-size:0.85rem;">Come back tomorrow for a new quiz.</p>
      </div>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
